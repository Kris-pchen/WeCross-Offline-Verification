server.port=8088
spring.application.name=transportation-verification-service

# Keep mock until VerificationStore is deployed and registered as a WeCross resource.
# Set WECROSS_MODE=sdk to submit real transactions through the Router.
wecross.mode=${WECROSS_MODE:mock}
wecross.contract-method=${WECROSS_CONTRACT_METHOD:saveRecord}

# Default chain resources used when the request does not pass targetChains.
wecross.default-targets=${WECROSS_DEFAULT_TARGETS:traffic.bcos30.VerificationStore,traffic.fabric20.VerificationStore}
wecross.router-url=${WECROSS_ROUTER_URL:http://127.0.0.1:8250}
